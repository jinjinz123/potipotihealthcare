<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Rounded blue background resembling a starry night sky -->
  <rect width="192" height="192" rx="40" fill="#2563eb" />
  
  <!-- Subtle circular gradient mask / glow -->
  <circle cx="96" cy="96" r="75" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" />
  
  <!-- Sleek Crescent Moon -->
  <path d="M125,120 C90,120 65,95 65,60 C65,50 68,40 73,32 C50,40 35,62 35,88 C35,121 62,148 95,148 C115,148 132,138 142,122 C137,121 131,120 125,120 Z" fill="#fef08a" />
  
  <!-- Little Sleep Star ★ -->
  <polygon points="120,45 123,52 131,53 125,58 127,66 120,62 113,66 115,58 109,53 117,52" fill="#ffffff" />
  <polygon points="145,75 147,80 152,81 148,84 149,89 145,86 141,89 142,84 138,81 143,80" fill="#ffffff" opacity="0.8" />
  
  <!-- Slumber S symbols representing deep sleep -->
  <path d="M110,95 Q115,92 120,95 T130,95" fill="none" stroke="#fef08a" stroke-width="3" stroke-linecap="round" />
</svg>
